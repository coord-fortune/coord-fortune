      line-height: 1.5;

      color: #999;
      line-height: 1.6;
    }

    .input-card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .input-label {
      font-size: 0.85rem;
      color: #c47010;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: block;
    }
    .date-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .date-inputs select {
      flex: 1;
      padding: 13px 8px;
      background: #fdf5e6;
      border: 2px solid #e0c88a;
      border-radius: 14px;
      color: #3d2b1f;
      font-size: 15px;
      text-align: center;
      appearance: none;
      cursor: pointer;
    }
    .date-inputs select:focus {
      outline: none;
      border-color: #c47010;
    }

    .btn-fortune {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #d4851a, #b85c10);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;

      margin-bottom: 16px;

      height: 150px;

      margin: 0 auto 18px;

      justify-content: center;
      font-size: 56px;
      border: 3px solid #e0c88a;
      overflow: hidden;

      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .kaburiko-name {
      font-size: 1.5rem;
      font-weight: 900;
      color: #5d4037;
      margin-bottom: 8px;
    }
    .kaburiko-keyword {
      font-size: 0.85rem;
      color: #c47010;
      background: #fdf5e6;
      border: 1px solid #e0c88a;
      border-radius: 20px;
      padding: 5px 16px;
      display: inline-block;
    }

      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      margin-bottom: 16px;
    }
    .rank-num {
      font-size: 2.6rem;
      font-weight: 900;
      color: #5d4037;
      line-height: 1;
      margin-bottom: 6px;
    }
    .rank-label { font-size: 0.78rem; color: #aaa; }

      padding: 18px 20px;

      color: #c47010;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .f-text {
      font-size: 0.92rem;
      color: #444;
      line-height: 1.7;

      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;

      line-height: 1.4;

      margin-bottom: 14px;

    .w-title {

      padding: 14px;

      font-size: 0.75rem;
      color: #bbb;

function getSign(month, day) {
  if ((month===3&&day>=21)||(month===4&&day<=19)) return "牡羊座";
  if ((month===4&&day>=20)||(month===5&&day<=20)) return "牡牛座";
  if ((month===5&&day>=21)||(month===6&&day<=21)) return "双子座";
  if ((month===6&&day>=22)||(month===7&&day<=22)) return "蟹座";
  if ((month===7&&day>=23)||(month===8&&day<=22)) return "獅子座";
  if ((month===8&&day>=23)||(month===9&&day<=22)) return "乙女座";
  if ((month===9&&day>=23)||(month===10&&day<=23)) return "天秤座";
  if ((month===10&&day>=24)||(month===11&&day<=22)) return "蠍座";
  if ((month===11&&day>=23)||(month===12&&day<=21)) return "射手座";
  if ((month===12&&day>=22)||(month===1&&day<=19)) return "山羊座";
  if ((month===1&&day>=20)||(month===2&&day<=18)) return "水瓶座";
  return "魚座";
}

function getKaburiko(id) { return kaburiko.find(k => k.id === id); }

function getDailySeed(id) {
  const d = new Date();
  const str = `${d.getFullYear()}${d.getMonth()}${d.getDate()}${id}`;
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = (h<<5)-h+str.charCodeAt(i); h|=0; }
  return Math.abs(h);
}

function getDailyRank(id) {
  const sorted = [...kaburiko].sort((a,b) => getDailySeed(a.id+'rank')-getDailySeed(b.id+'rank'));
  return sorted.findIndex(k=>k.id===id)+1;
}

// セレクト生成
const selMonth = document.getElementById('selMonth');
const selDay   = document.getElementById('selDay');
for (let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';selMonth.appendChild(o);}
for (let d=1;d<=31;d++){const o=document.createElement('option');o.value=d;o.textContent=d+'日';selDay.appendChild(o);}

function showResult() {
  const month = parseInt(selMonth.value);
  const day   = parseInt(selDay.value);
  if (!month||!day){alert('生年月日を選んでね！');return;}

  const sign   = getSign(month, day);
  const typeId = signToKaburiko[sign];
  const me     = getKaburiko(typeId);
  const seed   = getDailySeed(typeId);
  const rank   = getDailyRank(typeId);
  const comp   = compatibility[typeId];
  const friend = getKaburiko(comp.friend);
  const rival  = getKaburiko(comp.rival);

  const d = new Date();
  document.getElementById('resultDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

  document.getElementById('kaburakoEmoji').innerHTML = `<img src="kaburiko/${me.id}.png" alt="${me.name}">`;
  document.getElementById('kaburakoName').textContent    = me.name;
  document.getElementById('kaburakoKeyword').textContent = me.keyword;

  const rankEmoji = rank===1?'🥇':rank<=3?'🥈':rank<=6?'✨':rank<=11?'🔮':'🌙';
  document.getElementById('rankNum').textContent = `${rankEmoji} ${rank}位`;

  const fm = fortuneMsg[typeId];
  document.getElementById('fortuneText').textContent = fm[seed%fm.length];
  document.getElementById('loveText').textContent    = loveMsg[typeId];
  document.getElementById('workText').textContent    = workMsg[typeId];

  document.getElementById('friendEmoji').innerHTML  = `<img src="kaburiko/${friend.id}.png" alt="${friend.name}">`;
  document.getElementById('friendName').textContent   = friend.name;
  document.getElementById('friendAdvice').textContent = friendAdvice[comp.friend];
  document.getElementById('rivalEmoji').innerHTML   = `<img src="kaburiko/${rival.id}.png" alt="${rival.name}">`;
  document.getElementById('rivalName').textContent    = rival.name;
  document.getElementById('rivalAdvice').textContent  = rivalAdvice[comp.rival];

  // ランクと整合性のある囁き
  const wBank = rank===1 ? whisperMsg.rank1 :
                rank<=3  ? whisperMsg.rank2_3 :
                rank<=6  ? whisperMsg.rank4_6 :
                rank<=11 ? whisperMsg.rank7_11 :
                           whisperMsg.rank16;
  document.getElementById('whisperText').textContent = wBank[typeId];

  document.getElementById('input').style.display  = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo(0,0);
}

function resetApp() {
  document.getElementById('input').style.display  = 'block';
  document.getElementById('result').style.display = 'none';
  selMonth.value=''; selDay.value='';
  window.scrollTo(0,0);
}
