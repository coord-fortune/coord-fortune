    .sign-date {

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 20px 0;

    .today-label {

      color: #b39ddb;
      margin-bottom: 12px;

    let stars = [];

    function initStars() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        alpha: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        twinkle: Math.random() * Math.PI * 2,
      }));
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.twinkle += s.speed;
        s.alpha = 0.3 + Math.sin(s.twinkle) * 0.4;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    initStars();
    drawStars();
    window.addEventListener('resize', initStars);

    function getSign(month, day) {
      const dates = [
        [1,19,'山羊座'], [2,18,'水瓶座'], [3,20,'魚座'], [4,19,'牡羊座'],
        [5,20,'牡牛座'], [6,20,'双子座'], [7,22,'蟹座'], [8,22,'獅子座'],
        [9,22,'乙女座'], [10,22,'天秤座'], [11,21,'蠍座'], [12,21,'射手座'],
      ];
      for (const [m, d, name] of dates) {
        if (month < m || (month === m && day <= d)) return name;
      }
      return '山羊座';
    }

    function getStars(seed, min, max) {
      const val = min + (seed % (max - min + 1));
      return '★'.repeat(val) + '☆'.repeat(5 - val);
    }

      const colorIdx = seed % data.colors.length;
      const itemIdx = (seed + 1) % data.items.length;

      document.getElementById('res-name').textContent = signName;
      document.getElementById('res-date').textContent = sign.keyword;
      document.getElementById('res-overall').textContent = getStars(seed, 2, 5);
      document.getElementById('res-love').textContent = getStars(seed + 1, 2, 5);
      document.getElementById('res-money').textContent = getStars(seed + 2, 2, 5);
      document.getElementById('res-health').textContent = getStars(seed + 3, 2, 5);
