<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かぶりこ度診断</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #fdf5e6;
      min-height: 100vh;
      color: #3d2b1f;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }

    .header {
      text-align: center;
      padding: 40px 0 16px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #5d4037;
      line-height: 1.5;
    }
    .header p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #999;
      line-height: 1.6;
    }
    .header .chara {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 16px;
    }
    .chara-circle {
      width: 160px;
      height: 160px;
      background: #f0d9a8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      position: relative;
      overflow: hidden;
    }
    .chara-circle img {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }
    .deco {
      position: absolute;
      font-size: 1rem;
      opacity: 0.7;
    }
    .deco-tl { top: -8px; left: -16px; }
    .deco-tr { top: 0px; right: -20px; font-size: 0.8rem; }
    .deco-bl { bottom: 8px; left: -20px; font-size: 0.8rem; }
    .deco-br { bottom: -4px; right: -12px; }

    .progress-wrap {
      background: #e8d5b0;
      border-radius: 20px;
      height: 10px;
      margin: 16px 0 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #d4851a, #b85c10);
      border-radius: 20px;
      transition: width 0.4s ease;
    }
    .progress-text {
      text-align: right;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 20px;
    }

    .question-card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .question-number {
      font-size: 0.8rem;
      color: #c47010;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .question-text {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.6;
      color: #333;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-btn {
      background: #fdf5e6;
      border: 2px solid #e0c88a;
      border-radius: 14px;
      padding: 14px 18px;
      text-align: left;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
      line-height: 1.4;
    }
    .option-btn:hover {
      background: #f5e8c0;
      border-color: #c47010;
      color: #333;
      transform: translateY(-1px);
    }
    .option-btn.selected {
      background: #c47010;
      border-color: #a35a08;
      color: white;
      font-weight: 700;
    }

    .next-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #d4851a, #b85c10);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .next-btn:disabled { background: #ddd; cursor: not-allowed; transform: none; }

    /* ショップフッター */
    .shop-footer {
      margin-top: 40px;
      padding: 24px 0 10px;
      text-align: center;
      border-top: 1px solid #e0c88a;
    }
    .shop-title {
      font-size: 0.82rem;
      color: #a07850;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    .shop-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .shop-btn {
      display: inline-block;
      padding: 11px 24px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .shop-btn.booth {
      background: #f5a623;
      color: white;
    }
    .shop-btn.line {
      background: #06c755;
      color: white;
    }
    .shop-btn:hover { opacity: 0.85; transform: translateY(-2px); }

    /* 結果画面 */
    #result-screen { display: none; }

    .result-hero {
      background: linear-gradient(135deg, #c47010, #8b3e08);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      color: white;
      margin-bottom: 16px;
      box-shadow: 0 6px 24px rgba(231,111,81,0.35);
    }
    .result-hero .label {
      font-size: 1rem;
      font-weight: 900;
      opacity: 0.85;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .result-type {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin-bottom: 4px;
    }
    .result-name {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 14px;
    }
    .result-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .keyword {
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
    }

    .result-card {
      background: white;
      border-radius: 20px;
      padding: 22px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      margin-bottom: 14px;
    }
    .result-card h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #c47010;
      margin-bottom: 10px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .result-card p {
      font-size: 0.93rem;
      line-height: 1.8;
      color: #555;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .two-col .result-card {
      margin-bottom: 0;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      font-size: 0.82rem;
      padding: 5px 12px;
      border-radius: 50px;
      font-weight: 700;
    }
    .tag.green { background: #e8f5e9; color: #2e7d32; }
    .tag.red { background: #fce4ec; color: #c62828; }
    .tag.blue { background: #e3f2fd; color: #1565c0; }
    .tag.purple { background: #f3e5f5; color: #6a1b9a; }

    .compat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .compat-item {
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.85rem;
    }
    .compat-item.best {
      background: #e8f5e9;
      border: 1.5px solid #a5d6a7;
    }
    .compat-item.good {
      background: #fff8e1;
      border: 1.5px solid #ffe082;
    }
    .compat-item.bad {
      background: #fce4ec;
      border: 1.5px solid #f48fb1;
    }
    .compat-item .compat-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #888;
      margin-bottom: 4px;
    }
    .compat-item .compat-type {
      font-size: 0.72rem;
      font-weight: 400;
      color: #888;
      margin-top: 2px;
    }
    .compat-item .compat-name {
      font-size: 0.95rem;
      font-weight: 900;
      color: #333;
    }

    .image-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      margin-bottom: 14px;
      text-align: center;
    }
    .image-card h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f4a261;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .image-card img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }
    .image-card .img-note {
      font-size: 0.78rem;
      color: #bbb;
      margin-top: 8px;
    }
    .image-missing {
      background: #fff8f0;
      border: 2px dashed #f4a261;
      border-radius: 12px;
      padding: 20px;
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.6;
    }

    .retry-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: white;
      color: #b85c10;
      border: 2px solid #b85c10;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .retry-btn:hover { background: #fff0ee; }
    .share-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #e8640c;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      margin-top: 12px;
    }
    .share-btn:hover { background: #cf5608; }

    /* スタート画面 */
    #start-screen { text-align: center; }
    .start-card {
      background: white;
      border-radius: 24px;
      padding: 0;
      margin-bottom: 0;
    }
    .badge-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 8px;
      flex-wrap: wrap;
    }
    .badge {
      background: #f5e8c0;
      color: #7a4a10;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 50px;
      border: 1.5px solid #c8a050;
    }
    .start-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #d4851a, #b85c10);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(232,118,94,0.4);
      margin-top: 24px;
    }
    .start-btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .start-note {
      font-size: 0.75rem;
      color: #bbb;
      margin-top: 12px;
      text-align: center;
    }
    .page-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c47010;
    }
    .dot.inactive { background: #d8c89a; }

    .fade-in {
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="chara">
      <div class="chara-circle">
        <img src="kaburiko/ESFJ.png" alt="かぶりこちゃん" onerror="this.style.display='none'">
      </div>
      <span class="deco deco-tl">✦</span>
      <span class="deco deco-tr">♡</span>
      <span class="deco deco-bl">☆</span>
      <span class="deco deco-br">✧</span>
    </div>
    <h1>あなたの<br><strong>かぶりこ度</strong><br>診断</h1>
    <p>あなたの性格タイプを<br>20問で診断するよ！</p>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen">
    <div class="badge-row">
      <span class="badge">📝 全20問</span>
      <span class="badge">⏱️ 約3分</span>
      <span class="badge">✦ 16タイプ</span>
    </div>
    <button class="start-btn" onclick="startQuiz()">🔮 さっそく診断してみる！</button>
    <p class="start-note">※ 診断結果はお楽しみの範囲です</p>
    <div class="page-dots">
      <div class="dot"></div>
      <div class="dot inactive"></div>
      <div class="dot inactive"></div>
      <div class="dot inactive"></div>
    </div>
  </div>

  <!-- 問題画面 -->
  <div id="quiz-screen" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">1 / 20</div>

    <div class="question-card fade-in" id="question-card">
      <div class="question-number" id="q-number">Q1</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>つぎへ →</button>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen">

    <div class="result-hero fade-in">
      <div class="label">✨ あなたのかぶりこタイプ ✨</div>
      <div id="res-chara-img" style="margin: 12px auto 8px; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center;"></div>
      <div class="result-name" id="res-name" style="font-size:1.8rem;"></div>
      <div id="res-degree" style="font-size:1.2rem; font-weight:900; margin: 8px 0; opacity:0.95;"></div>
      <div id="res-type" style="font-size:0.85rem; opacity:0.75; margin-bottom:10px; font-weight:700; letter-spacing:2px;"></div>
      <div class="result-keywords" id="res-keywords"></div>
    </div>

    <div class="result-card">
      <h3>💬 どんな人？</h3>
      <p id="res-desc"></p>
    </div>

    <div class="result-card" style="background: #fff8f5; border: 2px solid #f9c5b8;">
      <h3>🧥 かぶりこちゃんからひとこと</h3>
      <p id="res-advice" style="color: #c87965;"></p>
    </div>

    <div class="two-col">
      <div class="result-card">
        <h3>✨ 得意なこと</h3>
        <div class="tag-list" id="res-strengths"></div>
      </div>
      <div class="result-card">
        <h3>💦 苦手なこと</h3>
        <div class="tag-list" id="res-weaknesses"></div>
      </div>
    </div>

    <div class="result-card">
      <h3>🌟 こんな場面で輝く</h3>
      <p id="res-scene"></p>
    </div>

    <div class="result-card">
      <h3>💞 かぶりこ相性診断</h3>
      <div class="compat-grid" id="res-compat"></div>
    </div>

    <div class="image-card">
      <h3>🧥 かぶりこちゃんの16タイプ</h3>
      <div id="image-area"></div>
      <div class="img-note">↑ 自分のタイプを探してみてね！</div>
    </div>

    <button class="share-btn" onclick="shareResult()">結果をシェアする 📤</button>
    <button class="retry-btn" onclick="resetQuiz()">もう一回やってみる 🔄</button>
  </div>

</div>

<script>
const questions = [
  // E/I
  { axis: 'EI', text: '週末の過ごし方、どっちが自分に近い？', options: [
    { label: '友達や家族と賑やかに過ごしたい！', score: 2 },
    { label: 'どちらかといえば外で人と過ごすのが好き', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば家でのんびりしたい', score: -1 },
    { label: '一人でゆっくり過ごすのが最高〜', score: -2 },
  ]},
  { axis: 'EI', text: '初対面の人と話すとき、どっちに近い？', options: [
    { label: 'すぐ打ち解けて話せる方', score: 2 },
    { label: 'わりとすぐ話せる', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: '少し時間がかかる方', score: -1 },
    { label: 'かなり時間がかかる…', score: -2 },
  ]},
  { axis: 'EI', text: '疲れたとき、どうやって元気を取り戻す？', options: [
    { label: '人と話したり出かけたりして回復する', score: 2 },
    { label: 'どちらかといえば人と過ごす方が元気になる', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば一人の時間が必要', score: -1 },
    { label: '絶対一人でいないと回復しない！', score: -2 },
  ]},
  { axis: 'EI', text: 'グループの中での自分って？', options: [
    { label: '自分から話しかけて場を盛り上げる方', score: 2 },
    { label: 'わりと積極的に話す方', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば聞き役になりがち', score: -1 },
    { label: 'だいたい観察役・聞き役', score: -2 },
  ]},
  { axis: 'EI', text: '予定のない休日、どう感じる？', options: [
    { label: 'どこか出かけたくなってソワソワする', score: 2 },
    { label: 'わりと外に出たい気分になる', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'わりと家にいたい', score: -1 },
    { label: '家でのんびりが最高すぎる', score: -2 },
  ]},

  // S/N
  { axis: 'SN', text: '新しいことを始めるとき、どっちに近い？', options: [
    { label: 'まず実績や手順をしっかり調べてから始める', score: 2 },
    { label: 'どちらかといえば情報収集を先にする', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば直感でとりあえず始める', score: -1 },
    { label: 'ひらめいたらすぐ動く！', score: -2 },
  ]},
  { axis: 'SN', text: '物事を考えるとき、どっちが得意？', options: [
    { label: '具体的・現実的に考える方が得意', score: 2 },
    { label: 'どちらかといえば具体的に考える', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえばアイデアや可能性を広げる', score: -1 },
    { label: 'いつも「こうなったら？」って妄想してる', score: -2 },
  ]},
  { axis: 'SN', text: '会話の中で、どっちが楽しい？', options: [
    { label: '具体的な出来事や事実について話す方が楽しい', score: 2 },
    { label: 'どちらかといえば具体的な話が好き', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば将来や仮定の話が好き', score: -1 },
    { label: '「もしも〜だったら？」な話が大好き！', score: -2 },
  ]},
  { axis: 'SN', text: '自分の思考スタイルは？', options: [
    { label: '今ここにある現実や事実を大切にする', score: 2 },
    { label: 'どちらかといえば現実的', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば未来や可能性を見る', score: -1 },
    { label: 'いつも「もっとこうなれば」って考えてる', score: -2 },
  ]},
  { axis: 'SN', text: '仕事や作業のやり方は？', options: [
    { label: '実績のある確実な方法でやりたい', score: 2 },
    { label: 'どちらかといえば慣れたやり方が好き', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば新しいやり方を試したい', score: -1 },
    { label: '常に新しいアプローチを試したい！', score: -2 },
  ]},

  // T/F
  { axis: 'TF', text: '誰かに意見を伝えるとき、何を優先する？', options: [
    { label: '正確な事実や論理を優先して伝える', score: 2 },
    { label: 'どちらかといえば論理を優先する', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば相手の気持ちを優先する', score: -1 },
    { label: '相手が傷つかないよう気持ちを最優先にする', score: -2 },
  ]},
  { axis: 'TF', text: '友達が悩みを相談してきた。どうする？', options: [
    { label: '原因を分析して解決策を提案する', score: 2 },
    { label: 'どちらかといえばアドバイスをする', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえばまず共感して話を聞く', score: -1 },
    { label: 'とにかく気持ちに寄り添うことが大事！', score: -2 },
  ]},
  { axis: 'TF', text: '何かを決めるとき、どっちに頼る？', options: [
    { label: 'データや論理で判断する', score: 2 },
    { label: 'どちらかといえば論理重視', score: 1 },
    { label: 'どちらともいえない', score: 0 },
    { label: 'どちらかといえば感情・価値観重視', score: -1 },

      { type: 'ISFP', name: 'アーティストかぶりこ', level: 'best' },
      { type: 'INFP', name: 'ロマンチストかぶりこ', level: 'bad' },
    ]
  },
};

let currentQ = 0;
let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
let selectedScore = null;

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-number').textContent = `Q${currentQ + 1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-text').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress-bar').style.width = `${(currentQ / questions.length) * 100}%`;

  const optionsEl = document.getElementById('q-options');
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(i, opt.score);
    optionsEl.appendChild(btn);
  });

  selectedScore = null;
  document.getElementById('next-btn').disabled = true;
  const card = document.getElementById('question-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function selectOption(index, score) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.option-btn')[index].classList.add('selected');
  selectedScore = score;
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (selectedScore === null) return;
  scores[questions[currentQ].axis] += selectedScore;
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  const E = scores.EI >= 0 ? 'E' : 'I';
  const S = scores.SN >= 0 ? 'S' : 'N';
  const T = scores.TF >= 0 ? 'T' : 'F';
  const J = scores.JP >= 0 ? 'J' : 'P';
  const typeCode = E + S + T + J;
  const type = types[typeCode];

  document.getElementById('res-type').textContent = `（${typeCode}）`;
  document.getElementById('res-name').textContent = type.name;
  document.getElementById('res-degree').textContent = `🧥 かぶりこ度 ${type.degree}%`;
  document.getElementById('res-desc').textContent = type.desc;
  document.getElementById('res-advice').textContent = type.advice;
  document.getElementById('res-scene').textContent = type.scene;

  // キーワード
  const kw = document.getElementById('res-keywords');
  kw.innerHTML = type.keywords.map(k => `<span class="keyword">#${k}</span>`).join('');

  // 得意・苦手
  document.getElementById('res-strengths').innerHTML =
    type.strengths.map(s => `<span class="tag green">${s}</span>`).join('');
  document.getElementById('res-weaknesses').innerHTML =
    type.weaknesses.map(s => `<span class="tag red">${s}</span>`).join('');

  // 相性
  const compat = document.getElementById('res-compat');
  compat.innerHTML = type.compat.map(c => `
    <div class="compat-item ${c.level}">
      <div class="compat-label">${c.level === 'best' ? '💞 最高の相性' : c.level === 'good' ? '👍 相性いい' : '💦 苦手な相手'}</div>
      <div class="compat-name">${c.name}</div>
      <div class="compat-type">${c.type}</div>
    </div>
  `).join('');

  // 個別キャラ画像（ヒーロー内）
  const charaImgArea = document.getElementById('res-chara-img');
  const charaImg = new Image();
  charaImg.src = `kaburiko/${typeCode}.png`;
  charaImg.alt = type.name;
  charaImg.style.width = '200px';
  charaImg.style.height = '200px';
  charaImg.style.objectFit = 'contain';
  charaImg.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.18))';
  charaImgArea.innerHTML = '';
  charaImgArea.appendChild(charaImg);

  // 一覧画像（下部カード）
  const imageArea = document.getElementById('image-area');
  const img = new Image();
  img.src = 'kaburiko_16p.png';
  img.alt = 'かぶりこちゃんかぶりこ度診断';
  img.style.width = '100%';
  img.style.borderRadius = '12px';
  img.onload = () => { imageArea.innerHTML = ''; imageArea.appendChild(img); };
  img.onerror = () => {
    imageArea.innerHTML = `<div class="image-missing">
      🧥 画像を表示するには<br>
      <strong>kaburiko_16p.png</strong> を<br>
      このファイルと同じフォルダに入れてね！
    </div>`;
  };

  rs.classList.remove('fade-in');
  void rs.offsetWidth;
  rs.classList.add('fade-in');
  window.scrollTo(0, 0);
}

function shareResult() {
  const name = document.getElementById('res-name').textContent;
  const typeCode = document.getElementById('res-type').textContent.replace(/[（）]/g, '');
  const text = `私は「${name}」タイプでした！\nあなたも診断してみてね👇\n#かぶりこ度診断\n${location.href}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('コピーしました！LINEやSNSに貼り付けてシェアしてね🎀');
    });
  } else {
    prompt('このテキストをコピーしてシェアしてね！', text);
  }
}

function resetQuiz() {
  currentQ = 0;
  scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
  selectedScore = null;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  window.scrollTo(0, 0);
}
</script>
